<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin — aminpashna.com</title>
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0f0f0f; --ink-soft: #3a3a3a; --ink-muted: #888;
  --paper: #f7f5f0; --paper-warm: #ede9e0; --white: #fff;
  --accent: #b5863a; --accent-light: #d4a85a; --rule: #d8d3c8;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-mono: 'DM Mono', 'Courier New', monospace;
  --red: #c0392b; --green: #2e7d32;
}
body { background: var(--paper); color: var(--ink); font-family: var(--font-display); font-weight: 300; min-height: 100vh; }
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ink); }
.login-box { width: 100%; max-width: 400px; padding: 3rem; border-top: 3px solid var(--accent); background: var(--paper); }
.login-eyebrow { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); margin-bottom: .8rem; }
.login-title { font-family: var(--font-display); font-size: 2.2rem; font-weight: 300; line-height: 1.1; margin-bottom: 2rem; color: var(--ink); }
.login-title em { font-style: italic; color: var(--accent); }
.form-group { margin-bottom: 1.2rem; }
.form-label { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-muted); display: block; margin-bottom: .4rem; }
.form-input { width: 100%; border: 1px solid var(--rule); padding: .8rem 1rem; font-family: var(--font-mono); font-size: .85rem; color: var(--ink); background: var(--white); outline: none; transition: border-color .2s; }
.form-input:focus { border-color: var(--accent); }
.login-btn { width: 100%; padding: .9rem; font-family: var(--font-mono); font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; background: var(--ink); color: var(--paper); border: none; cursor: pointer; transition: background .2s; margin-top: .4rem; }
.login-btn:hover:not(:disabled) { background: var(--accent); }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-error { margin-top: 1rem; padding: .7rem 1rem; background: #fdf2f2; border: 1px solid #f5c6cb; color: var(--red); font-family: var(--font-mono); font-size: .72rem; display: none; }
.lockout-msg { margin-top: 1rem; padding: .7rem 1rem; background: #fff8e1; border: 1px solid #ffe082; color: #7a5c00; font-family: var(--font-mono); font-size: .72rem; display: none; }
#dashboard { display: none; }
header { background: var(--ink); padding: 1.2rem 3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
.header-logo { font-family: var(--font-display); font-size: 1rem; font-weight: 600; letter-spacing: .06em; color: var(--paper); text-decoration: none; }
.header-logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 1.5rem; }
.header-label { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: #666; }
.logout-btn { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-muted); background: none; border: 1px solid #333; padding: .4rem .9rem; cursor: pointer; transition: all .2s; }
.logout-btn:hover { border-color: var(--accent); color: var(--accent); }
.dashboard-body { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 3rem; }
.stat-card { padding: 1.4rem 1.6rem; border: 1px solid var(--rule); background: var(--white); }
.stat-num { font-family: var(--font-display); font-size: 2.6rem; font-weight: 600; color: var(--ink); line-height: 1; }
.stat-label { font-family: var(--font-mono); font-size: .65rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-muted); margin-top: .3rem; }
.section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.2rem; }
.section-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 300; }
.section-title em { font-style: italic; color: var(--accent); }
.refresh-btn { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-muted); background: none; border: 1px solid var(--rule); padding: .4rem .9rem; cursor: pointer; transition: all .2s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.user-table { width: 100%; border-collapse: collapse; }
.user-table th { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-muted); text-align: left; padding: .7rem 1rem; border-bottom: 2px solid var(--rule); background: var(--paper-warm); }
.user-table td { padding: .9rem 1rem; border-bottom: 1px solid var(--rule); font-size: .95rem; vertical-align: middle; }
.user-table tr:last-child td { border-bottom: none; }
.user-table tr:hover td { background: var(--paper-warm); }
.user-name { font-weight: 400; color: var(--ink); }
.user-email { font-family: var(--font-mono); font-size: .75rem; color: var(--ink-muted); }
.uses-bar-wrap { display: flex; align-items: center; gap: .7rem; }
.uses-bar { height: 4px; background: var(--rule); flex: 1; max-width: 80px; }
.uses-bar-fill { height: 100%; background: var(--accent); }
.uses-num { font-family: var(--font-mono); font-size: .72rem; color: var(--ink-muted); min-width: 3rem; }
.joined-date { font-family: var(--font-mono); font-size: .72rem; color: var(--ink-muted); }
.badge { display: inline-block; font-family: var(--font-mono); font-size: .6rem; letter-spacing: .08em; text-transform: uppercase; padding: .2rem .5rem; border: 1px solid; }
.badge-active { border-color: var(--green); color: var(--green); }
.badge-inactive { border-color: var(--rule); color: var(--ink-muted); }
.loading-row td { text-align: center; padding: 3rem; font-family: var(--font-mono); font-size: .75rem; color: var(--ink-muted); letter-spacing: .1em; }
footer { margin-top: 4rem; padding: 1.5rem 2rem; border-top: 1px solid var(--rule); font-family: var(--font-mono); font-size: .62rem; color: var(--ink-muted); text-align: center; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <p class="login-eyebrow">aminpashna.com</p>
    <h1 class="login-title">Admin <em>Access</em></h1>
    <div class="form-group">
      <label class="form-label" for="admin-pass">Password</label>
      <input class="form-input" type="password" id="admin-pass" placeholder="········" autocomplete="off" />
    </div>
    <button class="login-btn" id="login-btn" onclick="adminLogin()">Enter Dashboard →</button>
    <div class="login-error" id="login-error">Incorrect password.</div>
    <div class="lockout-msg" id="lockout-msg"></div>
  </div>
</div>

<div id="dashboard">
  <header>
    <a href="index.html" class="header-logo">Amin <span>Pashna</span></a>
    <div class="header-right">
      <span class="header-label">Admin Dashboard</span>
      <button class="logout-btn" onclick="adminLogout()">Sign Out</button>
    </div>
  </header>
  <div class="dashboard-body">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Users</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-queries">—</div><div class="stat-label">Total Queries</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-active">—</div><div class="stat-label">Active Users</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-today">—</div><div class="stat-label">Joined Today</div></div>
    </div>
    <div class="section-header">
      <h2 class="section-title">Registered <em>Users</em></h2>
      <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
    </div>
    <table class="user-table">
      <thead><tr><th>Name</th><th>Email</th><th>Queries Used</th><th>Joined</th><th>Status</th></tr></thead>
      <tbody id="user-tbody"><tr class="loading-row"><td colspan="5">LOADING USERS...</td></tr></tbody>
    </table>
    <footer>aminpashna.com · Admin · Data stored in Cloudflare KV</footer>
  </div>
</div>

<script>
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_MS = 5 * 60 * 1000;
  const ATTEMPT_KEY = 'admin_attempts';
  const LOCKOUT_KEY = 'admin_lockout_until';
  const API = 'https://sql-toolkit-proxy.amin-p.workers.dev';
  let _sessionKey = null;

  (function init() { enforceLockout(); })();

  document.getElementById('admin-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') adminLogin();
  });

  function getAttempts() { return parseInt(localStorage.getItem(ATTEMPT_KEY) || '0', 10); }
  function getLockout()  { return parseInt(localStorage.getItem(LOCKOUT_KEY)  || '0', 10); }

  function recordFailure() {
    var a = getAttempts() + 1;
    localStorage.setItem(ATTEMPT_KEY, a);
    if (a >= MAX_ATTEMPTS) { localStorage.setItem(LOCKOUT_KEY, Date.now() + LOCKOUT_MS); enforceLockout(); }
    return a;
  }

  function clearFailures() { localStorage.removeItem(ATTEMPT_KEY); localStorage.removeItem(LOCKOUT_KEY); }

  function enforceLockout() {
    var until = getLockout();
    if (!until || Date.now() >= until) return false;
    var btn = document.getElementById('login-btn');
    var msg = document.getElementById('lockout-msg');
    btn.disabled = true; msg.style.display = 'block';
    msg.textContent = 'Too many attempts. Try again in ' + Math.ceil((until - Date.now()) / 1000) + 's.';
    var t = setInterval(function() {
      var left = Math.ceil((getLockout() - Date.now()) / 1000);
      if (left <= 0) { clearInterval(t); btn.disabled = false; msg.style.display = 'none'; localStorage.removeItem(LOCKOUT_KEY); localStorage.setItem(ATTEMPT_KEY,'0'); }
      else { msg.textContent = 'Too many attempts. Try again in ' + left + 's.'; }
    }, 1000);
    return true;
  }

  async function adminLogin() {
    if (enforceLockout()) return;
    var pass = document.getElementById('admin-pass').value;
    if (!pass) return;
    var btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Verifying...';
    try {
      var res = await fetch(API + '/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:pass}) });
      var data = await res.json();
      if (res.ok) {
        clearFailures();
        _sessionKey = pass;
        sessionStorage.setItem('admin_auth','true');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderUsers(Array.isArray(data.users) ? data.users : []);
      } else {
        var att = recordFailure();
        var left = MAX_ATTEMPTS - att;
        var errEl = document.getElementById('login-error');
        errEl.style.display = 'block';
        errEl.textContent = left > 0 ? 'Incorrect password. ' + left + ' attempt' + (left!==1?'s':'') + ' remaining.' : 'Too many failed attempts. You are now locked out.';
        document.getElementById('admin-pass').value = ''; document.getElementById('admin-pass').focus();
      }
    } catch(e) {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-error').textContent = 'Network error. Please try again.';
    } finally { btn.disabled = false; btn.textContent = 'Enter Dashboard →'; }
  }

  function adminLogout() {
    _sessionKey = null; sessionStorage.removeItem('admin_auth');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-pass').value = '';
  }

  async function loadUsers() {
    if (!_sessionKey) {
      document.getElementById('user-tbody').innerHTML = '<tr class="loading-row"><td colspan="5">Session expired. Please sign out and log in again.</td></tr>';
      return;
    }
    document.getElementById('user-tbody').innerHTML = '<tr class="loading-row"><td colspan="5">LOADING...</td></tr>';
    try {
      var res = await fetch(API + '/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:_sessionKey}) });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error||'Failed');
      renderUsers(Array.isArray(data.users) ? data.users : []);
    } catch(e) { document.getElementById('user-tbody').innerHTML = '<tr class="loading-row"><td colspan="5">Error: ' + esc(e.message) + '</td></tr>'; }
  }

  function renderUsers(users) {
    var today = new Date().toISOString().substring(0,10);
    document.getElementById('stat-total').textContent   = users.length;
    document.getElementById('stat-queries').textContent = users.reduce(function(s,u){return s+(u.uses||0);},0);
    document.getElementById('stat-active').textContent  = users.filter(function(u){return (u.uses||0)>0;}).length;
    document.getElementById('stat-today').textContent   = users.filter(function(u){return u.createdAt&&u.createdAt.startsWith(today);}).length;
    users.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
    if (!users.length) { document.getElementById('user-tbody').innerHTML='<tr class="loading-row"><td colspan="5">No users yet.</td></tr>'; return; }
    document.getElementById('user-tbody').innerHTML = users.map(function(u) {
      var pct=Math.round(((u.uses||0)/20)*100);
      var date=u.createdAt?new Date(u.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
      var active=(u.uses||0)>0;
      return '<tr><td><div class="user-name">'+esc(u.name)+'</div></td><td><div class="user-email">'+esc(u.email)+'</div></td><td><div class="uses-bar-wrap"><div class="uses-bar"><div class="uses-bar-fill" style="width:'+pct+'%"></div></div><span class="uses-num">'+(u.uses||0)+' / 20</span></div></td><td><span class="joined-date">'+date+'</span></td><td><span class="badge '+(active?'badge-active':'badge-inactive')+'">'+(active?'Active':'New')+'</span></td></tr>';
    }).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
</body>
</html>
